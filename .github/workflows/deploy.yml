name: Deploy Blazor to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ChannelDungeons.BlazorWasm/ChannelDungeons.BlazorWasm.csproj

      - name: Build
        run: dotnet build ChannelDungeons.BlazorWasm/ChannelDungeons.BlazorWasm.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ChannelDungeons.BlazorWasm/ChannelDungeons.BlazorWasm.csproj --configuration Release --output release --nologo

      - name: Fix base href for GitHub Pages subdirectory
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if ! grep -qE '<base\s+href="/' release/wwwroot/index.html; then
            echo "ERROR: Expected base href not found in index.html — aborting to prevent broken deployment"
            exit 1
          fi
          sed -i -E "s|<base\s+href=\"/[^\"]*\"\s*/>|<base href=\"/${REPO_NAME}/\" />|g" release/wwwroot/index.html
          echo "Replaced base href with /${REPO_NAME}/"

      - name: Add 404.html for SPA routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'release/wwwroot'

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
