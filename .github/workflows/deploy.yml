name: Deploy Blazor to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ChannelDungeons.BlazorWasm/ChannelDungeons.BlazorWasm.csproj

      - name: Build
        run: dotnet build ChannelDungeons.BlazorWasm/ChannelDungeons.BlazorWasm.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ChannelDungeons.BlazorWasm/ChannelDungeons.BlazorWasm.csproj --configuration Release --output release --nologo

      - name: Fix base href for GitHub Pages subdirectory
        run: |
          INDEX="release/wwwroot/index.html"
          if [ ! -f "${INDEX}" ]; then
            echo "ERROR: ${INDEX} not found — publish step may have failed"
            exit 1
          fi
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_HREF="/${REPO_NAME}/"
          if grep -qE '<base[[:space:]]+href="'"${TARGET_HREF}"'"' "${INDEX}"; then
            echo "base href is already set to ${TARGET_HREF} — no change needed"
          elif grep -qE '<base[[:space:]]+href="/"' "${INDEX}"; then
            sed -i -E "s|<base[[:space:]]+href=\"/\"[[:space:]]*/?>|<base href=\"${TARGET_HREF}\" />|g" "${INDEX}"
            echo "Replaced base href with ${TARGET_HREF}"
          else
            echo "WARNING: No root-relative base href found — skipping replacement"
          fi

      - name: Add 404.html for SPA routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'release/wwwroot'

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
